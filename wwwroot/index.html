<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YELLOW SIGN DINER - Operations Dashboard</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700;900&family=Be+Vietnam+Pro:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #000000;
      --panel: #171311;
      --panel-2: #201b18;
      --accent: #fbbf24;
      --accent-soft: rgba(251, 191, 36, 0.18);
      --text: #fef3c7;
      --muted: rgba(254, 243, 199, 0.68);
      --line: rgba(254, 243, 199, 0.12);
      --danger: #f87171;
      --danger-soft: rgba(248, 113, 113, 0.14);
      --success: #86efac;
      --shadow: 0 0 24px rgba(251, 191, 36, 0.16);
      --header-h: 80px;
      --footer-h: 36px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Be Vietnam Pro', Arial, sans-serif;
    }

    body {
      overflow: hidden;
      background-image:
        linear-gradient(rgba(254, 243, 199, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(254, 243, 199, 0.03) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    button, input {
      font: inherit;
    }

    .app-shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      border-bottom: 2px solid rgba(254, 243, 199, 0.16);
      background: #0a0a0a;
      box-shadow: 0 4px 20px rgba(251, 191, 36, 0.12);
      flex-shrink: 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 18px;
      flex-wrap: wrap;
    }

    .title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 0.04em;
      color: var(--accent);
      text-transform: uppercase;
      font-style: italic;
      text-shadow: 0 0 12px rgba(251, 191, 36, 0.45);
    }

    .nav {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
    }

    .nav-pill {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .nav-pill.active {
      color: #111;
      background: var(--accent);
      padding: 8px 12px;
      box-shadow: 4px 4px 0 0 #fef3c7;
    }

    .status-banner {
      padding: 18px 28px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(251, 191, 36, 0.07), rgba(251, 191, 36, 0.02));
      flex-shrink: 0;
    }

    .status-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .status-main {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 48px;
      font-weight: 900;
      line-height: 1.05;
      color: var(--accent);
      text-shadow: 0 0 16px rgba(251, 191, 36, 0.42);
      text-transform: uppercase;
    }

    .status-sub {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
    }

    .main-grid {
      flex: 1;
      min-height: 0;
      display: flex;
      overflow: hidden;
    }

    .panel {
      flex: 1 1 33.333%;
      min-width: 0;
      display: flex;
      flex-direction: column;
      padding: 22px;
      background: rgba(0, 0, 0, 0.35);
      border-right: 2px solid var(--line);
    }

    .panel:last-child {
      border-right: none;
    }

    .panel-title-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--accent);
      margin-bottom: 18px;
      flex-shrink: 0;
    }

    .panel-title {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 10px rgba(251, 191, 36, 0.34);
    }

    .panel-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .panel-scroll {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
    }

    .panel-scroll::-webkit-scrollbar,
    #log-area::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    .panel-scroll::-webkit-scrollbar-track,
    #log-area::-webkit-scrollbar-track {
      background: #0d0d0d;
    }

    .panel-scroll::-webkit-scrollbar-thumb,
    #log-area::-webkit-scrollbar-thumb {
      background: var(--accent);
    }

    .section-button, .danger-button, .ghost-button {
      border: none;
      cursor: pointer;
      transition: transform 0.12s ease, filter 0.12s ease, background 0.12s ease;
    }

    .section-button:active,
    .danger-button:active,
    .ghost-button:active {
      transform: translateY(1px);
    }

    .section-button {
      width: 100%;
      padding: 14px 16px;
      background: var(--accent);
      color: #111;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      box-shadow: var(--shadow);
    }

    .section-button:hover {
      filter: brightness(1.04);
    }

    .ghost-button {
      padding: 12px 14px;
      border: 2px solid rgba(254, 243, 199, 0.24);
      background: transparent;
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .ghost-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .danger-button {
      padding: 12px 14px;
      border: 2px solid rgba(248, 113, 113, 0.35);
      background: var(--danger-soft);
      color: #fecaca;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .danger-button:hover {
      background: rgba(248, 113, 113, 0.2);
    }

    .upload-wrap {
      margin-top: 16px;
      flex-shrink: 0;
    }

    .inbox-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 12px;
      margin-bottom: 10px;
      background: var(--panel);
      border-left: 4px solid var(--accent);
      border: 1px solid rgba(254, 243, 199, 0.08);
      cursor: pointer;
      transition: background 0.12s ease, border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .inbox-item:hover {
      background: var(--panel-2);
    }

    .inbox-item.selected {
      background: rgba(251, 191, 36, 0.14);
      border-color: rgba(251, 191, 36, 0.5);
      box-shadow: var(--shadow);
    }

    .file-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      word-break: break-word;
    }

    .delete-x {
      border: none;
      background: transparent;
      color: var(--danger);
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      padding: 4px 8px;
      flex-shrink: 0;
    }

    .delete-x:hover {
      background: rgba(248, 113, 113, 0.12);
    }

    .selection-card {
      background: var(--panel);
      border: 1px solid rgba(254, 243, 199, 0.12);
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2);
    }

    .selection-label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .selection-file {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--text);
      min-height: 20px;
      word-break: break-word;
    }

    .log-card {
      margin-top: 16px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      background: #040404;
      border: 1px solid rgba(251, 191, 36, 0.18);
    }

    .log-toolbar {
      padding: 10px 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(251, 191, 36, 0.15);
      background: rgba(251, 191, 36, 0.08);
      gap: 10px;
      flex-shrink: 0;
    }

    .log-toolbar span {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .mini-btn {
      border: none;
      background: transparent;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      cursor: pointer;
      text-transform: uppercase;
    }

    .mini-btn:hover {
      text-decoration: underline;
    }

    #log-area {
      flex: 1;
      min-height: 0;
      overflow: auto;
      padding: 14px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      line-height: 1.55;
      color: #d1fae5;
      background: #020202;
      white-space: pre-wrap;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
      flex-shrink: 0;
    }

    .button-row .danger-button {
      grid-column: 1 / -1;
    }

    table.record-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .record-table th {
      text-align: left;
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0 0 10px;
      border-bottom: 1px solid rgba(251, 191, 36, 0.16);
    }

    .record-table td {
      padding: 10px 8px 10px 0;
      border-bottom: 1px solid rgba(254, 243, 199, 0.06);
      word-break: break-word;
    }

    .record-row-even {
      background: rgba(255,255,255,0.03);
    }

    .status-chip {
      display: inline-block;
      padding: 2px 8px;
      border: 1px solid rgba(251, 191, 36, 0.28);
      background: rgba(251, 191, 36, 0.1);
      color: var(--accent);
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .footer-ticker {
      height: var(--footer-h);
      display: flex;
      align-items: center;
      overflow: hidden;
      background: var(--accent);
      color: #111;
      flex-shrink: 0;
    }

    .footer-label {
      height: 100%;
      display: flex;
      align-items: center;
      padding: 0 14px;
      background: #111;
      color: var(--accent);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      border-right: 1px solid #111;
      white-space: nowrap;
    }

    .footer-text {
      white-space: nowrap;
      padding-left: 100%;
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      animation: scrollTicker 24s linear infinite;
    }

    @keyframes scrollTicker {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100%); }
    }

    .empty-state {
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 12px 2px;
    }

    @media (max-width: 1100px) {
      .main-grid {
        flex-direction: column;
      }

      .panel {
        border-right: none;
        border-bottom: 2px solid var(--line);
        min-height: 33%;
      }

      .panel:last-child {
        border-bottom: none;
      }

      .status-main {
        font-size: 34px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    "use strict";

    const API = "https://";

    // id="inbox-list"
    // id="upload-btn"
    // id="process-btn"
    // id="log-area"
    // id="records-table"

    const { useState, useEffect } = React;
    const h = React.createElement;

    function nowStamp() {
      return new Date().toLocaleTimeString();
    }

    function formatDateTime(date) {
      return date.toLocaleString();
    }

    function App() {
      const [health, setHealth] = useState({
        status: "Loading",
        service: "cmsc-website",
        region: "us-east-1",
        timestamp: ""
      });
      const [inboxFiles, setInboxFiles] = useState([]);
      const [selectedFile, setSelectedFile] = useState("");
      const [logs, setLogs] = useState([
        `[${nowStamp()}] System boot sequence initialized.`,
        `[${nowStamp()}] Waiting for API health check.`
      ]);
      const [records, setRecords] = useState([
        {
          filename: "demo_record.png",
          status: "placeholder",
          timestamp: formatDateTime(new Date())
        }
      ]);

      function appendLog(message) {
        setLogs((prev) => [`[${nowStamp()}] ${message}`, ...prev]);
      }

      async function loadHealth() {
        try {
          const res = await fetch(`${API}/api/health`);
          const data = await res.json();
          setHealth({
            status: data.status || "ok",
            service: data.service || "cmsc-website",
            region: data.region || "us-east-1",
            timestamp: data.timestamp || ""
          });
          appendLog("Health endpoint responded successfully.");
        } catch (error) {
          setHealth((prev) => Object.assign({}, prev, { status: "error" }));
          appendLog(`Health endpoint failed: ${error.message}`);
        }
      }

      async function loadInbox() {
        try {
          const res = await fetch(`${API}/api/inbox`);
          const data = await res.json();
          const files = Array.isArray(data) ? data : [];
          setInboxFiles(files);
          if (files.length && !files.includes(selectedFile)) {
            setSelectedFile(files[0]);
          }
          if (!files.length) {
            setSelectedFile("");
          }
          appendLog(`Inbox refreshed. ${files.length} item(s) loaded.`);
        } catch (error) {
          setInboxFiles([]);
          setSelectedFile("");
          appendLog(`Inbox load failed: ${error.message}`);
        }
      }

      async function uploadFile(file) {
        if (!file) return;

        try {
          appendLog(`Requesting upload URL for ${file.name}...`);
          const presignRes = await fetch(`${API}/api/inbox`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ filename: file.name })
          });

          const presignData = await presignRes.json();

          if (!presignRes.ok || !presignData.url) {
            throw new Error("Could not get presigned upload URL.");
          }

          appendLog(`Uploading ${file.name} to inbox bucket...`);
          const uploadRes = await fetch(presignData.url, {
            method: "PUT",
            headers: { "Content-Type": file.type || "image/png" },
            body: file
          });

          if (!uploadRes.ok) {
            throw new Error("S3 upload failed.");
          }

          appendLog(`Upload complete: ${file.name}`);
          await loadInbox();
          setSelectedFile(file.name);
        } catch (error) {
          appendLog(`Upload failed: ${error.message}`);
          alert(`Upload failed: ${error.message}`);
        }
      }

      async function deleteFile(filename) {
        if (!filename) return;
        try {
          const res = await fetch(`${API}/api/inbox/${encodeURIComponent(filename)}`, {
            method: "DELETE"
          });

          if (!res.ok) {
            throw new Error("Delete failed.");
          }

          appendLog(`Deleted file: ${filename}`);
          if (selectedFile === filename) {
            setSelectedFile("");
          }
          await loadInbox();
        } catch (error) {
          appendLog(`Delete failed: ${error.message}`);
          alert(`Delete failed: ${error.message}`);
        }
      }

      function renderInbox() {
        if (!inboxFiles.length) {
          return h("div", { className: "empty-state" }, "No files in inbox.");
        }

        return inboxFiles.map((filename) =>
          h(
            "div",
            {
              key: filename,
              className: `inbox-item${selectedFile === filename ? " selected" : ""}`,
              onClick: function () { setSelectedFile(filename); }
            },
            h("div", { className: "file-name" }, filename),
            h(
              "button",
              {
                className: "delete-x",
                onClick: function (event) {
                  event.stopPropagation();
                  deleteFile(filename);
                },
                title: `Delete ${filename}`
              },
              "✕"
            )
          )
        );
      }

      function handleProcess() {
        if (!selectedFile) {
          appendLog("No file selected for processing.");
          return;
        }

        appendLog(`Processing started for ${selectedFile}.`);
        appendLog(`Placeholder process completed for ${selectedFile}.`);

        const newRecord = {
          filename: selectedFile,
          status: "processed",
          timestamp: formatDateTime(new Date())
        };

        setRecords((prev) => [newRecord].concat(prev));
      }

      function loadRecords() {
        appendLog("Records view loaded.");
        setRecords((prev) => prev.length ? prev : [{
          filename: "demo_record.png",
          status: "placeholder",
          timestamp: formatDateTime(new Date())
        }]);
      }

      function clearRecords() {
        setRecords([]);
        appendLog("Records display cleared.");
      }

      function deleteAllRecords() {
        setRecords([]);
        appendLog("All displayed records deleted.");
      }

      function clearLog() {
        setLogs([`[${nowStamp()}] Log cleared.`]);
      }

      useEffect(function () {
        loadHealth();
        loadInbox();
      }, []);

      return h(
        "div",
        { className: "app-shell" },
        h(
          "header",
          { className: "topbar" },
          h(
            "div",
            { className: "brand" },
            h("div", { className: "title" }, "Yellow Sign Diner"),
            h(
              "nav",
              { className: "nav" },
              h("span", { className: "nav-pill active" }, "Inbox"),
              h("span", { className: "nav-pill" }, "Processor"),
              h("span", { className: "nav-pill" }, "Records")
            )
          ),
          h("div", { className: "nav" },
            h("span", { className: "nav-pill" }, "AWS Ops"),
            h("span", { className: "nav-pill" }, "Shift 04")
          )
        ),
        h(
          "section",
          { className: "status-banner" },
          h("div", { className: "status-label" }, "System Integration Status"),
          h("div", { className: "status-main" }, String(health.status || "UNKNOWN").toUpperCase()),
          h(
            "div",
            { className: "status-sub" },
            `SERVICE: ${health.service || "cmsc-website"} | REGION: ${health.region || "us-east-1"} | ${health.timestamp || "Timestamp unavailable"}`
          )
        ),
        h(
          "main",
          { className: "main-grid" },
          h(
            "section",
            { className: "panel" },
            h(
              "div",
              { className: "panel-title-row" },
              h("h2", { className: "panel-title" }, "Inbox"),
              h("div", { className: "panel-meta" }, `${inboxFiles.length} item(s)`)
            ),
            h("div", { className: "panel-scroll", id: "inbox-list" }, renderInbox()),
            h(
              "div",
              { className: "upload-wrap" },
              h("input", {
                id: "file-input",
                type: "file",
                accept: "image/*",
                style: { display: "none" },
                onChange: function (event) {
                  const file = event.target.files && event.target.files[0];
                  uploadFile(file);
                  event.target.value = "";
                }
              }),
              h(
                "button",
                {
                  id: "upload-btn",
                  className: "ghost-button",
                  onClick: function () {
                    const input = document.getElementById("file-input");
                    if (input) input.click();
                  }
                },
                "Upload"
              )
            )
          ),
          h(
            "section",
            { className: "panel" },
            h(
              "div",
              { className: "panel-title-row" },
              h("h2", { className: "panel-title" }, "Process"),
              h("div", { className: "panel-meta" }, "Manual trigger")
            ),
            h(
              "div",
              { className: "selection-card" },
              h("div", { className: "selection-label" }, "Current Selection"),
              h("div", { className: "selection-file" }, selectedFile || "No file selected")
            ),
            h(
              "button",
              {
                id: "process-btn",
                className: "section-button",
                onClick: handleProcess
              },
              "Process"
            ),
            h(
              "div",
              { className: "log-card" },
              h(
                "div",
                { className: "log-toolbar" },
                h("span", null, "Terminal Output"),
                h(
                  "button",
                  { className: "mini-btn", onClick: clearLog },
                  "Clear Log"
                )
              ),
              h(
                "div",
                { id: "log-area" },
                logs.join("\n")
              )
            )
          ),
          h(
            "section",
            { className: "panel" },
            h(
              "div",
              { className: "panel-title-row" },
              h("h2", { className: "panel-title" }, "Records"),
              h("div", { className: "panel-meta" }, `${records.length} row(s)`)
            ),
            h(
              "div",
              { className: "panel-scroll" },
              h(
                "table",
                { className: "record-table", id: "records-table" },
                h(
                  "thead",
                  null,
                  h(
                    "tr",
                    null,
                    h("th", null, "Filename"),
                    h("th", null, "Status"),
                    h("th", null, "Timestamp")
                  )
                ),
                h(
                  "tbody",
                  null,
                  records.length
                    ? records.map((record, index) =>
                        h(
                          "tr",
                          { key: `${record.filename}-${record.timestamp}-${index}`, className: index % 2 === 0 ? "record-row-even" : "" },
                          h("td", null, record.filename),
                          h("td", null, h("span", { className: "status-chip" }, record.status)),
                          h("td", null, record.timestamp)
                        )
                      )
                    : h(
                        "tr",
                        null,
                        h(
                          "td",
                          { colSpan: 3, className: "empty-state" },
                          "No records loaded."
                        )
                      )
                )
              )
            ),
            h(
              "div",
              { className: "button-row" },
              h("button", { className: "ghost-button", onClick: loadRecords }, "Load Records"),
              h("button", { className: "ghost-button", onClick: clearRecords }, "Clear"),
              h("button", { className: "danger-button", onClick: deleteAllRecords }, "Delete All")
            )
          )
        ),
        h(
          "footer",
          { className: "footer-ticker" },
          h("div", { className: "footer-label" }, "System Status: Nominal"),
          h("div", { className: "footer-text" }, "Yellow Sign Diner operations panel — health route online — inbox API connected — root landing page active — serverless MVP loaded —")
        )
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
